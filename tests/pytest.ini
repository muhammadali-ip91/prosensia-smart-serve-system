[pytest]
# ================================================
# ProSensia Smart-Serve — Pytest Configuration
# ================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts =
	-v
	--tb=short
	--strict-markers
	-ra
	--color=yes

# Markers
markers =
	unit: Unit tests
	integration: Integration tests (require running server)
	ai: AI module tests
	slow: Slow running tests
	e2e: End-to-end tests

# Async mode
asyncio_mode = auto

# Warnings
filterwarnings =
	ignore::DeprecationWarning
	ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S