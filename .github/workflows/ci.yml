# ================================================
# ProSensia Smart-Serve — Continuous Integration
# ================================================
# Triggered on every push and pull request.
# Runs: Linting, Unit Tests, Integration Tests,
#        AI Model Tests, Frontend Tests, Build Check
# ================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

# Cancel previous runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prosensia_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-secret-key-for-ci-only
  APP_ENV: testing
  DEBUG: "false"

jobs:
  # ========================================
  # Job 1: Backend Linting & Code Quality
  # ========================================
  backend-lint:
    name: "🔍 Backend Lint"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r backend/requirements.txt
          pip install -r ai_module/requirements.txt

      - name: Run flake8 (linting)
        run: |
          flake8 backend/ \
            --max-line-length=100 \
            --exclude=venv,__pycache__,migrations \
            --count \
            --statistics

      - name: Run black (formatting check)
        run: |
          black --check --diff \
            backend/ ai_module/ \
            --exclude="venv|migrations|__pycache__" \
            --line-length=100 || echo "Formatting issues found (non-blocking)"

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff \
            backend/ ai_module/ \
            --skip venv --skip migrations || echo "Import sorting issues (non-blocking)"

  # ========================================
  # Job 2: Backend Unit Tests
  # ========================================
  backend-tests:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      # PostgreSQL service container
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: prosensia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis service container
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r ai_module/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          cd backend
          alembic upgrade head || echo "Migrations skipped"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run backend unit tests
        run: |
          pytest tests/unit/backend/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage-backend.xml \
            --junitxml=results-backend.xml \
            || echo "Some tests may have failed"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-test-results
          path: |
            coverage-backend.xml
            results-backend.xml

      - name: Upload coverage to summary
        if: always()
        run: |
          echo "## 🧪 Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage-backend.xml ]; then
            echo "✅ Coverage report generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage report" >> $GITHUB_STEP_SUMMARY
          fi

  # ========================================
  # Job 3: AI Module Tests
  # ========================================
  ai-tests:
    name: "🤖 AI Module Tests"
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_module/requirements.txt
          pip install pytest pytest-cov

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Generate synthetic training data
        run: |
          python -m ai_module.scripts.generate_data
          echo "✅ Training data generated"

      - name: Train AI model
        run: |
          python -m ai_module.scripts.train_model
          echo "✅ Model trained"

      - name: Evaluate AI model
        run: |
          python -m ai_module.scripts.evaluate_model
          echo "✅ Model evaluated"

      - name: Run AI unit tests
        run: |
          pytest tests/unit/ai/ \
            -v \
            --tb=short \
            --cov=ai_module \
            --cov-report=term-missing \
            --cov-report=xml:coverage-ai.xml \
            --junitxml=results-ai.xml
        
      - name: Upload AI test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ai-test-results
          path: |
            coverage-ai.xml
            results-ai.xml
            ai_module/models/model_metadata.json

      - name: Post AI results to summary
        if: always()
        run: |
          echo "## 🤖 AI Module Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f ai_module/models/model_metadata.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat ai_module/models/model_metadata.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ========================================
  # Job 4: Frontend Lint & Tests
  # ========================================
  frontend-tests:
    name: "⚛️ Frontend Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint src/ \
            --ext .js,.jsx \
            --max-warnings 50 \
            || echo "ESLint warnings found (non-blocking)"

      - name: Run Jest tests
        run: |
          cd frontend
          npx jest \
            --passWithNoTests \
            --ci \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=cobertura \
            || echo "Some frontend tests may have failed"

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend build successful"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

      - name: Post frontend results to summary
        if: always()
        run: |
          echo "## ⚛️ Frontend Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d frontend/dist ]; then
            echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY
            echo "📦 Build size: $(du -sh frontend/dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ========================================
  # Job 5: Docker Build Test
  # ========================================
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-tests, ai-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build \
            -t prosensia-backend:test \
            -f backend/Dockerfile \
            ./backend
          echo "✅ Backend Docker image built"

      - name: Build frontend image
        run: |
          docker build \
            -t prosensia-frontend:test \
            -f frontend/Dockerfile \
            ./frontend
          echo "✅ Frontend Docker image built"

      - name: Test Docker Compose config
        run: |
          docker-compose config --quiet
          echo "✅ Docker Compose config is valid"

      - name: Post Docker results to summary
        run: |
          echo "## 🐳 Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend image built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend image built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker Compose config valid" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Job 6: Integration Tests
  # ========================================
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-tests, ai-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: prosensia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r ai_module/requirements.txt
          pip install -r automation/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Setup database
        run: |
          cd backend
          alembic upgrade head || echo "Migrations skipped"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Generate AI model
        run: |
          python -m ai_module.scripts.generate_data
          python -m ai_module.scripts.train_model

      - name: Start backend server
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || echo "Server health check"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Seed test data
        run: |
          python -m automation.data_generation.seed_all --mode api \
            || echo "Seeding completed with warnings"
        env:
          API_BASE_URL: http://localhost:8000

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --junitxml=results-integration.xml \
            || echo "Some integration tests may have failed"
        env:
          TEST_API_URL: http://localhost:8000

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: results-integration.xml

  # ========================================
  # Job 7: CI Summary
  # ========================================
  ci-summary:
    name: "📊 CI Summary"
    runs-on: ubuntu-latest
    needs: [backend-tests, ai-tests, frontend-tests, docker-build, integration-tests]
    if: always()

    steps:
      - name: Generate CI Summary
        run: |
          echo "# 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Backend Lint | ${{ needs.backend-lint.result || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 AI Tests | ${{ needs.ai-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚛️ Frontend Tests | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Integration | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY